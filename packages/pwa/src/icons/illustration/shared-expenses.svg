    </linearGradient>
    <filter id="shared-expenses-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020c17" flood-opacity=".42"/>
