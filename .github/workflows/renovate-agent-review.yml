name: Renovate Agent Review

permissions: {}

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Renovate PR number to review.
        required: true
        type: number
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-codex-auth
  cancel-in-progress: false

jobs:
  review:
    name: Review Renovate PR
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.repository.fork == false &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        startsWith(github.event.workflow_run.head_branch, 'renovate/')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Resolve Renovate PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_DISPATCH_PR: ${{ inputs.pr }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [[ -n "${WORKFLOW_DISPATCH_PR:-}" ]]; then
            pr_json="$(gh pr view "$WORKFLOW_DISPATCH_PR" \
              --repo "$GITHUB_REPOSITORY" \
              --json author,headRefName,headRefOid,headRepository,isDraft,number)"
          else
            pr_json="$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --head "$WORKFLOW_BRANCH" \
              --json author,headRefName,headRefOid,headRepository,isDraft,number \
              | jq --arg branch "$WORKFLOW_BRANCH" 'map(select(.isDraft == false and .headRefName == $branch)) | first // empty')"

            if [[ -z "$pr_json" ]]; then
              echo "No open non-draft Renovate PR found for $WORKFLOW_BRANCH."
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          trusted="$(jq -r \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "${WORKFLOW_BRANCH:-}" \
            --arg sha "${WORKFLOW_HEAD_SHA:-}" \
            '
              (.author.login == "app/renovate" or .author.login == "renovate[bot]") and
              (.isDraft == false) and
              (.headRepository.nameWithOwner == $repo) and
              (.headRefName | startswith("renovate/")) and
              (($branch == "") or (.headRefName == $branch)) and
              (($sha == "") or (.headRefOid == $sha))
            ' <<< "$pr_json")"

          if [[ "$trusted" != "true" ]]; then
            echo "No trusted same-repository Renovate PR matched the workflow run."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_number="$(jq -r '.number' <<< "$pr_json")"
          echo "Found Renovate PR #$pr_number."
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Configure Lilith git identity
        if: steps.pr.outputs.found == 'true'
        run: |
          git config user.name "lilith[bot]"
          git config user.email "259750894+PUNK-02@users.noreply.github.com"

      - name: Load Codex auth from Bitwarden
        if: steps.pr.outputs.found == 'true'
        uses: bitwarden/sm-action@v3
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BITWARDEN_CODEX_AUTH_JSON_SECRET_ID }} > CODEX_AUTH_JSON

      - name: Restore Codex auth cache
        if: steps.pr.outputs.found == 'true'
        env:
          CODEX_HOME: ${{ runner.temp }}/codex
        run: |
          set -euo pipefail
          if [[ -z "${CODEX_AUTH_JSON:-}" ]]; then
            echo "::error::Bitwarden secret CODEX_AUTH_JSON is required for Codex account auth."
            exit 1
          fi

          codex_home="${CODEX_HOME:-$HOME/.codex}"
          auth_file="$codex_home/auth.json"

          mkdir -p "$codex_home"
          chmod 700 "$codex_home"
          printf '%s' "$CODEX_AUTH_JSON" > "$auth_file"
          chmod 600 "$auth_file"
          jq -e 'type == "object"' "$auth_file" > /dev/null

          auth_mode="$(jq -r '.auth_mode // empty' "$auth_file")"
          if [[ "$auth_mode" != "chatgpt" ]]; then
            echo "::error::Codex auth.json auth_mode must be 'chatgpt'."
            exit 1
          fi

          echo "CODEX_AUTH_JSON=" >> "$GITHUB_ENV"

      - name: Run Renovate agent review
        if: steps.pr.outputs.found == 'true'
        env:
          CODEX_HOME: ${{ runner.temp }}/codex
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          TRIZUM_AGENT_WORKFLOWS_GIT_PUSH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          TRIZUM_AGENT_WORKFLOWS_CODEX_MODEL: gpt-5.5
          TRIZUM_AGENT_WORKFLOWS_CODEX_EFFORT: xhigh
        run: |
          set -euo pipefail
          auth_file="${CODEX_HOME:-$HOME/.codex}/auth.json"
          if [[ ! -s "$auth_file" ]]; then
            echo "::error::Codex auth cache is missing at $auth_file."
            exit 1
          fi

          export PATH="$PWD/packages/agent-workflows/node_modules/.bin:$PATH"
          codex --version

          vp run --filter @trizum/agent-workflows renovate-pr-review -- \
            --pr "${{ steps.pr.outputs.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --write \
            --supersede \
            --comment \
            --codex required

      - name: Save refreshed Codex auth to Bitwarden
        if: success() && steps.pr.outputs.found == 'true'
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BITWARDEN_CODEX_AUTH_JSON_SECRET_ID: ${{ vars.BITWARDEN_CODEX_AUTH_JSON_SECRET_ID }}
          CODEX_HOME: ${{ runner.temp }}/codex
        run: |
          set -euo pipefail

          auth_file="${CODEX_HOME:-$HOME/.codex}/auth.json"
          if [[ ! -s "$auth_file" ]]; then
            echo "::warning::Codex auth cache is missing at $auth_file; skipping Bitwarden refresh."
            exit 0
          fi

          if [[ -z "${BITWARDEN_CODEX_AUTH_JSON_SECRET_ID:-}" ]]; then
            echo "::error::BITWARDEN_CODEX_AUTH_JSON_SECRET_ID is required to refresh Codex auth in Bitwarden."
            exit 1
          fi

          jq -e '
            type == "object" and
            .auth_mode == "chatgpt" and
            (
              (.tokens | type == "object") or
              (.access_token | type == "string") or
              (.refresh_token | type == "string") or
              ([.. | objects | has("access_token") or has("refresh_token")] | any)
            )
          ' "$auth_file" > /dev/null

          compact_auth="$(jq -c . "$auth_file")"
          echo "::add-mask::$compact_auth"
          docker run --rm \
            -e BWS_ACCESS_TOKEN \
            ghcr.io/bitwarden/bws@sha256:3927158c53ac5a17d6cbe59fc3e1353e426f168bf246dbfe3668f6de5eaa107f \
            secret edit "$BITWARDEN_CODEX_AUTH_JSON_SECRET_ID" \
            --value "$compact_auth" \
            --output none

      - name: Remove Codex auth cache
        if: always()
        env:
          CODEX_HOME: ${{ runner.temp }}/codex
        run: rm -rf "$CODEX_HOME"
