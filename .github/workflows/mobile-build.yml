name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "both"
        type: choice
        options:
          - android
          - ios
          - both
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      android_artifact:
        description: "Android artifact type (only for release builds)"
        required: false
        default: "apk"
        type: choice
        options:
          - apk
          - aab
      ios_export_method:
        description: "iOS export method (only for release builds)"
        required: false
        default: "app-store"
        type: choice
        options:
          - app-store
          - ad-hoc
  workflow_call:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        type: string
      build_type:
        description: "Build type"
        required: true
        type: string
      android_artifact:
        description: "Android artifact type (only for release builds)"
        required: false
        default: "apk"
        type: string
      ios_export_method:
        description: "iOS export method (only for release builds)"
        required: false
        default: "app-store"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build Android
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler: "2.7.2"
          bundler-cache: true
          cache-version: android-0
          working-directory: packages/mobile/android

      - name: Build mobile
        timeout-minutes: 8
        run: vp run --filter @trizum/mobile build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Decode Android keystore
        if: ${{ inputs.build_type == 'release' }}
        timeout-minutes: 2
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > packages/mobile/android/app/release.keystore

      - name: Build Android Debug
        if: ${{ inputs.build_type == 'debug' }}
        timeout-minutes: 15
        working-directory: packages/mobile/android
        run: bundle exec fastlane build_debug

      - name: Build Android Release APK
        if: ${{ inputs.build_type == 'release' && inputs.android_artifact == 'apk' }}
        timeout-minutes: 20
        working-directory: packages/mobile/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/packages/mobile/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane build_release

      - name: Build Android Release AAB
        if: ${{ inputs.build_type == 'release' && inputs.android_artifact == 'aab' }}
        timeout-minutes: 20
        working-directory: packages/mobile/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/packages/mobile/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane build_aab

      - name: Upload Android APK artifact
        if: ${{ inputs.android_artifact == 'apk' }}
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: android-${{ inputs.build_type }}-apk
          path: packages/mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 14

      - name: Upload Android AAB artifact
        if: ${{ inputs.build_type == 'release' && inputs.android_artifact == 'aab' }}
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: android-release-aab
          path: packages/mobile/android/app/build/outputs/bundle/**/*.aab
          retention-days: 14

  ios:
    name: Build iOS
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler: "2.7.2"
          bundler-cache: true
          cache-version: ios-0
          working-directory: packages/mobile/ios/App

      - name: Build mobile
        timeout-minutes: 8
        run: vp run --filter @trizum/mobile build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build iOS Debug
        if: ${{ inputs.build_type == 'debug' }}
        timeout-minutes: 15
        working-directory: packages/mobile/ios/App
        run: bundle exec fastlane build_debug

      - name: Build iOS Release (App Store)
        if: ${{ inputs.build_type == 'release' && inputs.ios_export_method == 'app-store' }}
        timeout-minutes: 20
        working-directory: packages/mobile/ios/App
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_REFRESH_PROVISIONING_PROFILE: "true"
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane build_release

      - name: Build iOS Release (Ad Hoc)
        if: ${{ inputs.build_type == 'release' && inputs.ios_export_method == 'ad-hoc' }}
        timeout-minutes: 20
        working-directory: packages/mobile/ios/App
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_ADHOC_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane build_adhoc

      - name: Upload iOS IPA artifact
        if: ${{ inputs.build_type == 'release' }}
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: ios-${{ inputs.ios_export_method }}-ipa
          path: packages/mobile/ios/App/*.ipa
          retention-days: 14

      - name: Upload iOS dSYM artifact
        if: ${{ inputs.build_type == 'release' }}
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: ios-dsym
          path: packages/mobile/ios/App/*.dSYM.zip
          retention-days: 14
