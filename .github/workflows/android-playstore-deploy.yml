name: Android Play Store Deploy

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track to deploy to"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Release status"
        required: true
        default: "draft"
        type: choice
        options:
          - draft
          - completed
          - halted
  workflow_call:
    inputs:
      track:
        description: "Play Store track to deploy to"
        required: true
        type: string
      release_status:
        description: "Release status"
        required: true
        type: string

concurrency:
  group: android-playstore-deploy
  cancel-in-progress: false

jobs:
  check-pending-changesets:
    permissions:
      contents: read
    uses: ./.github/workflows/check-pending-changesets.yml

  screenshots:
    name: Generate Screenshots
    needs: [check-pending-changesets]
    uses: ./.github/workflows/screenshots.yml
    with:
      artifact_name: android-screenshots

  deploy:
    name: Build & Deploy to Play Store
    needs: [check-pending-changesets, screenshots]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Ruby
        uses: ./.github/actions/setup-mobile-ruby
        with:
          cache-version: android-0
          working-directory: packages/mobile/android

      - name: Build mobile web assets
        timeout-minutes: 5
        run: vp run --filter @trizum/mobile build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Download screenshots artifact
        timeout-minutes: 2
        uses: actions/download-artifact@v8
        with:
          name: android-screenshots
          path: packages/screenshots/screenshots

      - name: Organize screenshots for fastlane
        timeout-minutes: 2
        working-directory: packages/screenshots
        run: |
          vp run organize:fastlane --platform android --output ../mobile/android/fastlane/metadata/android
          echo "Screenshots organized:"
          ls -la ../mobile/android/fastlane/metadata/android/ || true
          ls -la ../mobile/android/fastlane/metadata/android/en-US/images/phoneScreenshots/ || true

      - name: Decode Android keystore
        timeout-minutes: 2
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > packages/mobile/android/app/release.keystore

      - name: Decode Google Play JSON key
        timeout-minutes: 2
        env:
          GOOGLE_PLAY_JSON_KEY_BASE64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY_BASE64" | base64 -d > packages/mobile/android/play-store-key.json

      - name: Build and Deploy to Play Store
        timeout-minutes: 12
        working-directory: packages/mobile/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/packages/mobile/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY_FILE: ${{ github.workspace }}/packages/mobile/android/play-store-key.json
        run: |
          bundle exec fastlane deploy_playstore_full \
            track:${{ inputs.track }} \
            release_status:${{ inputs.release_status }}

      - name: Upload AAB artifact
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: android-playstore-aab
          path: packages/mobile/android/app/build/outputs/bundle/**/*.aab
          retention-days: 14

      - name: Cleanup sensitive files
        if: always()
        timeout-minutes: 2
        run: |
          rm -f packages/mobile/android/play-store-key.json
          rm -f packages/mobile/android/app/release.keystore
