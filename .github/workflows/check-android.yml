name: Check Android

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/check-android.yml"
      - ".github/workflows/android-internal-testing.yml"
      - ".github/workflows/android-playstore-deploy.yml"
      - ".github/workflows/mobile-build.yml"
      - ".node-version"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vite.config.ts"
      - "packages/mobile/android/**"
      - "packages/mobile/capacitor.config.ts"
      - "packages/mobile/capacitor.log.ts"
      - "packages/mobile/check-android.sh"
      - "packages/mobile/check-sync-clean.sh"
      - "packages/mobile/copy-client.sh"
      - "packages/mobile/package.json"
      - "packages/mobile/src/**"
      - "packages/mobile/sync.sh"
      - "packages/mobile/vite.config.ts"
      - "packages/pwa/package.json"
      - "packages/pwa/vite.config.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/check-android.yml"
      - ".github/workflows/android-internal-testing.yml"
      - ".github/workflows/android-playstore-deploy.yml"
      - ".github/workflows/mobile-build.yml"
      - ".node-version"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vite.config.ts"
      - "packages/mobile/android/**"
      - "packages/mobile/capacitor.config.ts"
      - "packages/mobile/capacitor.log.ts"
      - "packages/mobile/check-android.sh"
      - "packages/mobile/check-sync-clean.sh"
      - "packages/mobile/copy-client.sh"
      - "packages/mobile/package.json"
      - "packages/mobile/src/**"
      - "packages/mobile/sync.sh"
      - "packages/mobile/vite.config.ts"
      - "packages/pwa/package.json"
      - "packages/pwa/vite.config.ts"

permissions:
  contents: read

concurrency:
  group: check-android-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Android
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Check Android
        timeout-minutes: 20
        run: vp run --filter @trizum/mobile check:android
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
