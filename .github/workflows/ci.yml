name: CI

on:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        script:
          - check
          - build
          - test
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: vp run ${{ matrix.script }}
        run: vp run ${{ matrix.script }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_JAZZ_APP_ID: ${{ secrets.JAZZ_APP_ID }}
          VITE_JAZZ_SERVER_URL: https://v2.sync.jazz.tools/

      - name: Validate Jazz schema
        if: matrix.script == 'check'
        run: |
          vp run --filter @trizum/data jazz:validate
          vp run --filter @trizum/data jazz:schema:hash

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Deploy Jazz schema and permissions
        run: vp run --filter @trizum/data jazz:deploy
        env:
          JAZZ_ADMIN_SECRET: ${{ secrets.JAZZ_ADMIN_SECRET }}
          JAZZ_APP_ID: ${{ secrets.JAZZ_APP_ID }}
          JAZZ_SERVER_URL: https://v2.sync.jazz.tools/

      - name: Install Playwright Browsers
        timeout-minutes: 5
        run: vp run --filter @trizum/pwa test:e2e:install:ci

      - name: Run Playwright E2E
        run: vp run --filter @trizum/pwa test:e2e
        env:
          VITE_JAZZ_APP_ID: ${{ secrets.JAZZ_APP_ID }}
          VITE_JAZZ_SERVER_URL: https://v2.sync.jazz.tools/

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            packages/pwa/playwright-report
            packages/pwa/test-results
          if-no-files-found: ignore

  autofix:
    name: Autofix & Extract Messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Autofix
        id: autofix
        run: vp run check --fix
        continue-on-error: true

      - name: Extract Messages
        id: extract-messages
        run: vp run lingui:extract
        continue-on-error: true

      - name: Guard Catalog Conflict Markers
        run: |
          if grep -n -E '<<<<<<<|>>>>>>>|=======' packages/pwa/locale/*/messages.po; then
            echo "::error::Refusing to auto-commit Lingui catalogs containing conflict markers."
            exit 1
          fi

      - uses: EndBug/add-and-commit@v10
        with:
          commit: --signoff
          add: --all
          message: "style: apply automatic fixes"
          committer_name: GitHub Actions
          committer_email: actions@github.com

      - name: Check if autofix and extract messages were successful
        if: ${{ steps.autofix.outcome != 'success' || steps.extract-messages.outcome != 'success' }}
        run: echo "::error::Autofix or extract messages failed" && exit 1
