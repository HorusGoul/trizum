name: CI

on:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Matrix of multiple Turbo jobs
    strategy:
      matrix:
        turbo:
          - lint
          - typecheck
          - build
          - test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: ${{ matrix.turbo }}
        run: pnpm turbo run ${{ matrix.turbo }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browser
        run: pnpm --filter @trizum/pwa exec playwright install --with-deps chromium webkit

      - name: Run Playwright E2E
        run: pnpm test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            packages/pwa/playwright-report
            packages/pwa/test-results
          if-no-files-found: ignore

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [check]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run update-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  autofix:
    name: Autofix & Extract Messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Autofix
        id: autofix
        run: pnpm lint:fix
        continue-on-error: true

      - name: Extract Messages
        id: extract-messages
        run: pnpm lingui:extract
        continue-on-error: true

      - name: Guard Catalog Conflict Markers
        run: |
          if grep -n -E '<<<<<<<|>>>>>>>|=======' packages/pwa/locale/*/messages.po; then
            echo "::error::Refusing to auto-commit Lingui catalogs containing conflict markers."
            exit 1
          fi

      - uses: EndBug/add-and-commit@v9
        with:
          commit: --signoff
          add: --all
          message: "style: apply automatic fixes"
          committer_name: GitHub Actions
          committer_email: actions@github.com

      - name: Check if autofix and extract messages were successful
        if: ${{ steps.autofix.result != '0' || steps.extract-messages.result != '0' }}
        run: echo "::error::Autofix or extract messages failed" && exit 1
