name: CI

on:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        script:
          - check
          - build
          - test
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install Dependencies
        run: vp install --frozen-lockfile

      - name: vp run ${{ matrix.script }}
        run: vp run ${{ matrix.script }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install Dependencies
        run: vp install --frozen-lockfile

      - name: Install Playwright Browsers
        timeout-minutes: 5
        run: vp run --filter @trizum/pwa test:e2e:install:ci

      - name: Run Playwright E2E
        run: vp run --filter @trizum/pwa test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            packages/pwa/playwright-report
            packages/pwa/test-results
          if-no-files-found: ignore

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [check]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    outputs:
      should_deploy_pwa: ${{ steps.release-state.outputs.should_deploy_pwa }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
      - name: Install Dependencies
        run: vp install --frozen-lockfile
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp run update-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect PWA changeset release
        id: release-state
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          echo "should_deploy_pwa=false" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.changesets.outputs.hasChangesets }}" != "false" ]; then
            echo "Changesets are still pending; skipping production deploy."
            exit 0
          fi

          changed_files="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^packages/pwa/(package\.json|CHANGELOG\.md)$'; then
            echo "should_deploy_pwa=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-pwa-production:
    name: Deploy PWA Production
    runs-on: ubuntu-latest
    needs: [release]
    if: github.ref == 'refs/heads/main' && needs.release.outputs.should_deploy_pwa == 'true'
    permissions:
      contents: read
      deployments: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install Dependencies
        run: vp install --frozen-lockfile

      - name: Build PWA
        run: vp run --filter @trizum/pwa build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy PWA to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm
          workingDirectory: packages/pwa

  autofix:
    name: Autofix & Extract Messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
      - name: Install Dependencies
        run: vp install --frozen-lockfile

      - name: Autofix
        id: autofix
        run: vp run check --fix
        continue-on-error: true

      - name: Extract Messages
        id: extract-messages
        run: vp run lingui:extract
        continue-on-error: true

      - name: Guard Catalog Conflict Markers
        run: |
          if grep -n -E '<<<<<<<|>>>>>>>|=======' packages/pwa/locale/*/messages.po; then
            echo "::error::Refusing to auto-commit Lingui catalogs containing conflict markers."
            exit 1
          fi

      - uses: EndBug/add-and-commit@v10
        with:
          commit: --signoff
          add: --all
          message: "style: apply automatic fixes"
          committer_name: GitHub Actions
          committer_email: actions@github.com

      - name: Check if autofix and extract messages were successful
        if: ${{ steps.autofix.result != '0' || steps.extract-messages.result != '0' }}
        run: echo "::error::Autofix or extract messages failed" && exit 1
