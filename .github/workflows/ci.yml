name: CI

on:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        script:
          - check
          - build
          - test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: vp run ${{ matrix.script }}
        run: vp run ${{ matrix.script }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install Playwright Browsers
        timeout-minutes: 5
        run: vp run --filter @trizum/pwa test:e2e:install:ci

      - name: Run Playwright E2E
        run: vp run --filter @trizum/pwa test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            packages/pwa/playwright-report
            packages/pwa/test-results
          if-no-files-found: ignore

  mobile-sync:
    name: Mobile Sync (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            task: sync:check:android
          - platform: ios
            os: macos-26
            task: sync:check:ios
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Setup Ruby
        if: matrix.platform == 'ios'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler: "2.7.2"
          bundler-cache: true
          cache-version: ios-0
          working-directory: packages/mobile/ios/App

      - name: Check Capacitor sync
        run: vp run --filter @trizum/mobile ${{ matrix.task }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  autofix:
    name: Autofix & Extract Messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Autofix
        id: autofix
        run: vp run check --fix
        continue-on-error: true

      - name: Extract Messages
        id: extract-messages
        run: vp run lingui:extract
        continue-on-error: true

      - name: Guard Catalog Conflict Markers
        run: |
          if grep -n -E '<<<<<<<|>>>>>>>|=======' packages/pwa/locale/*/messages.po; then
            echo "::error::Refusing to auto-commit Lingui catalogs containing conflict markers."
            exit 1
          fi

      - uses: EndBug/add-and-commit@v10
        with:
          commit: --signoff
          add: --all
          message: "style: apply automatic fixes"
          author_name: lilith[bot]
          author_email: 259750894+PUNK-02@users.noreply.github.com
          committer_name: lilith[bot]
          committer_email: 259750894+PUNK-02@users.noreply.github.com
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Check if autofix and extract messages were successful
        if: ${{ steps.autofix.outcome != 'success' || steps.extract-messages.outcome != 'success' }}
        run: echo "::error::Autofix or extract messages failed" && exit 1
