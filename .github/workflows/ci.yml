name: CI

on:
  push:

permissions:
  contents: read
  checks: read
  statuses: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Matrix of multiple Turbo jobs
    strategy:
      matrix:
        turbo:
          - lint
          - typecheck
          - build
          - test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: ${{ matrix.turbo }}
        run: pnpm turbo run ${{ matrix.turbo }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [check]
    # This job can spend several minutes waiting for the Cloudflare preview on
    # non-main branches before it installs Playwright and runs the browser suite.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve E2E Base URL
        id: e2e-base-url
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = process.env.HEAD_SHA;
            const branchName = context.ref.replace(/^refs\/heads\//, "");
            const shortSha = ref.slice(0, 8);
            const productionUrl = "https://trizum.horusdev.workers.dev/";
            const timeoutMs = 20 * 60 * 1000;
            const pollIntervalMs = 15 * 1000;
            const startedAt = Date.now();

            if (context.ref === "refs/heads/main") {
              core.info(`Using production URL for main branch E2E: ${productionUrl}`);
              core.setOutput("base_url", productionUrl);
              return;
            }

            const isCloudflareContext = (value = "") =>
              /workers builds:\s*trizum/i.test(value) ||
              /cloudflare/i.test(value);

            const escapeRegex = (value = "") =>
              value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            const extractWorkersUrlByLabel = (value = "", labels = []) => {
              if (!value || typeof value !== "string") {
                return null;
              }

              const lines = value.split("\n");

              for (const label of labels) {
                const markdownLine = lines.find((line) =>
                  line.toLowerCase().includes(`${label.toLowerCase()}:`),
                );

                if (markdownLine) {
                  const markdownMatch = markdownLine.match(
                    /https:\/\/[a-z0-9-]+\.workers\.dev\/?/i,
                  );

                  if (markdownMatch) {
                    return markdownMatch[0];
                  }
                }

                const escapedLabel = escapeRegex(label);
                const linkTextPattern = new RegExp(
                  `<a[^>]+href=['"](https:\\/\\/[a-z0-9-]+\\.workers\\.dev\\/?)['"][^>]*>\\s*${escapedLabel}\\s*<\\/a>`,
                  "i",
                );
                const linkTextMatch = value.match(linkTextPattern);

                if (linkTextMatch) {
                  return linkTextMatch[1];
                }
              }

              return null;
            };

            const extractBranchPreviewUrl = (...values) => {
              for (const value of values) {
                const branchPreviewUrl = extractWorkersUrlByLabel(value, [
                  "Preview Alias URL",
                  "Branch Preview URL",
                ]);

                if (branchPreviewUrl) {
                  return branchPreviewUrl;
                }
              }

              return null;
            };

            const dedupeBy = (items, keyFn) => {
              const seen = new Set();
              return items.filter((item) => {
                const key = keyFn(item);
                if (seen.has(key)) {
                  return false;
                }

                seen.add(key);
                return true;
              });
            };

            while (Date.now() - startedAt < timeoutMs) {
              const [checkRunsResponse, statusesResponse, pullsResponse] =
                await Promise.all([
                  github.rest.checks.listForRef({
                    owner,
                    repo,
                    ref,
                    per_page: 100,
                  }),
                  github.rest.repos.listCommitStatusesForRef({
                    owner,
                    repo,
                    ref,
                    per_page: 100,
                  }),
                  github.rest.pulls.list({
                    owner,
                    repo,
                    head: `${owner}:${branchName}`,
                    state: "open",
                    per_page: 1,
                  }),
                ]);

              const relevantChecks = checkRunsResponse.data.check_runs.filter(
                (checkRun) =>
                  isCloudflareContext(checkRun.name) ||
                  isCloudflareContext(checkRun.app?.name ?? ""),
              );

              const relevantStatuses = dedupeBy(
                statusesResponse.data.filter((status) =>
                  isCloudflareContext(status.context),
                ),
                (status) => status.context,
              );

              const successfulCheck = relevantChecks.find(
                (checkRun) =>
                  checkRun.status === "completed" &&
                  checkRun.conclusion === "success",
              );

              const successfulStatus = relevantStatuses.find(
                (status) => status.state === "success",
              );

              const baseUrlFromStatus = extractBranchPreviewUrl(
                successfulCheck?.output?.summary,
                successfulCheck?.output?.text,
                successfulCheck?.output?.title,
                successfulStatus?.description,
              );

              if (baseUrlFromStatus) {
                core.info(`Using Cloudflare branch preview URL: ${baseUrlFromStatus}`);
                core.setOutput("base_url", baseUrlFromStatus);
                return;
              }

              const pullRequest = pullsResponse.data[0];

              if (pullRequest) {
                const commentsResponse = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: pullRequest.number,
                  per_page: 100,
                });

                const cloudflareComment = [...commentsResponse.data]
                  .reverse()
                  .find(
                    (comment) =>
                      comment.user?.login === "cloudflare-workers-and-pages[bot]",
                  );
                const baseUrlFromComment = extractBranchPreviewUrl(
                  cloudflareComment?.body,
                );

                if (baseUrlFromComment) {
                  core.info(
                    `Using Cloudflare branch preview URL from PR comment: ${baseUrlFromComment}`,
                  );
                  core.setOutput("base_url", baseUrlFromComment);
                  return;
                }
              }

              const hasPendingCheck = relevantChecks.some(
                (checkRun) =>
                  checkRun.status !== "completed" ||
                  checkRun.conclusion === null,
              );

              const hasPendingStatus = relevantStatuses.some((status) =>
                ["pending"].includes(status.state),
              );

              const hasFailure =
                relevantChecks.some(
                  (checkRun) =>
                    checkRun.status === "completed" &&
                    ["failure", "cancelled", "timed_out", "action_required"].includes(
                      checkRun.conclusion ?? "",
                    ),
                ) ||
                relevantStatuses.some((status) =>
                  ["error", "failure"].includes(status.state),
                );

              if (
                (relevantChecks.length > 0 || relevantStatuses.length > 0) &&
                hasFailure &&
                !hasPendingCheck &&
                !hasPendingStatus
              ) {
                core.setFailed(
                  "Cloudflare preview checks finished without a usable branch preview URL.",
                );
                return;
              }

              core.info(
                `Waiting for Cloudflare branch preview on ${shortSha}. Checks: ${relevantChecks.length}, statuses: ${relevantStatuses.length}, pull requests: ${pullsResponse.data.length}.`,
              );

              await new Promise((resolve) =>
                setTimeout(resolve, pollIntervalMs),
              );
            }

            core.setFailed(
              "Timed out waiting for a successful Cloudflare preview deployment.",
            );

      - name: Install Playwright Browser
        run: pnpm --filter @trizum/pwa exec playwright install --with-deps chromium webkit

      - name: Run Playwright E2E
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.e2e-base-url.outputs.base_url }}

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/pwa/playwright-report
            packages/pwa/test-results
          if-no-files-found: ignore

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [check]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run update-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  autofix:
    name: Autofix & Extract Messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Autofix
        id: autofix
        run: pnpm lint:fix
        continue-on-error: true

      - name: Extract Messages
        id: extract-messages
        run: pnpm lingui:extract
        continue-on-error: true

      - uses: EndBug/add-and-commit@v9
        with:
          commit: --signoff
          add: --all
          message: "style: apply automatic fixes"
          committer_name: GitHub Actions
          committer_email: actions@github.com

      - name: Check if autofix and extract messages were successful
        if: ${{ steps.autofix.result != '0' || steps.extract-messages.result != '0' }}
        run: echo "::error::Autofix or extract messages failed" && exit 1
