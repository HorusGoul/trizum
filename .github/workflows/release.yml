name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: changesets-release-main
      cancel-in-progress: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          branch: main
          version: vp run update-version
          publish: vp run publish-packages
          github-token: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}

  deploy-jazz-production:
    name: Deploy Jazz Production
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' &&
      !github.event.release.prerelease &&
      (
        startsWith(github.event.release.tag_name, '@trizum/pwa@') ||
        startsWith(github.event.release.tag_name, '@trizum/mobile@')
      )
    permissions:
      contents: read
    concurrency:
      group: jazz-production
      cancel-in-progress: false
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Deploy Jazz schema and permissions
        run: vp run --filter @trizum/data jazz:deploy
        env:
          JAZZ_ADMIN_SECRET: ${{ secrets.JAZZ_ADMIN_SECRET }}
          JAZZ_APP_ID: ${{ secrets.JAZZ_APP_ID }}
          JAZZ_SERVER_URL: https://v2.sync.jazz.tools/

  deploy-pwa-production:
    name: Deploy PWA Production
    needs: [deploy-jazz-production]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, '@trizum/pwa@') && !github.event.release.prerelease
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: pwa-production
      cancel-in-progress: false
    environment:
      name: pwa-production
      url: https://trizum.app
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Build PWA
        run: vp run --filter @trizum/pwa build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_JAZZ_APP_ID: ${{ secrets.JAZZ_APP_ID }}
          VITE_JAZZ_SERVER_URL: https://v2.sync.jazz.tools/

      - name: Deploy PWA to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm
          workingDirectory: packages/pwa

  build-mobile-android-release-apk:
    name: Build Mobile Android Release APK
    needs: [deploy-jazz-production]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, '@trizum/mobile@') && !github.event.release.prerelease
    permissions:
      contents: read
    uses: ./.github/workflows/mobile-build.yml
    with:
      platform: android
      build_type: release
      android_artifact: apk
    secrets: inherit

  deploy-mobile-android-production:
    name: Deploy Mobile Android Production
    needs: [deploy-jazz-production]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, '@trizum/mobile@') && !github.event.release.prerelease
    permissions:
      contents: read
    uses: ./.github/workflows/android-playstore-deploy.yml
    with:
      track: production
      release_status: completed
      deploy_jazz: false
    secrets: inherit

  deploy-mobile-ios-production:
    name: Deploy Mobile iOS Production
    needs: [deploy-jazz-production]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, '@trizum/mobile@') && !github.event.release.prerelease
    permissions:
      contents: read
    uses: ./.github/workflows/ios-appstore-deploy.yml
    with:
      submit_for_review: true
      automatic_release: true
      deploy_jazz: false
    secrets: inherit

  attach-mobile-android-release-assets:
    name: Attach Mobile Android Release Assets
    needs: [build-mobile-android-release-apk, deploy-mobile-android-production]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, '@trizum/mobile@') && !github.event.release.prerelease
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download signed APK artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release-apk
          path: release-assets/apk

      - name: Download signed AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: android-playstore-aab
          path: release-assets/aab

      - name: Attach Android release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#@trizum/mobile@}"
          apk_path="$(find release-assets/apk -name "*.apk" -print -quit)"
          aab_path="$(find release-assets/aab -name "*.aab" -print -quit)"

          if [ -z "$apk_path" ] || [ -z "$aab_path" ]; then
            echo "Missing Android APK or AAB artifact" >&2
            exit 1
          fi

          cp "$apk_path" "trizum-mobile-${version}-signed.apk"
          cp "$aab_path" "trizum-mobile-${version}-signed.aab"
          gh release upload "$RELEASE_TAG" \
            "trizum-mobile-${version}-signed.apk" \
            "trizum-mobile-${version}-signed.aab" \
            --clobber
