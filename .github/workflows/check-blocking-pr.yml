name: Check Blocking PR

on:
  workflow_call:
    inputs:
      pull_request_number:
        description: "Pull request number that must be merged before continuing"
        required: true
        type: number

jobs:
  check:
    name: Check Blocking PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Ensure blocking PR is merged before release
        uses: actions/github-script@v7
        env:
          BLOCKING_PR_NUMBER: ${{ inputs.pull_request_number }}
        with:
          script: |
            const prNumber = Number(process.env.BLOCKING_PR_NUMBER);
            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (pr.state === "open") {
              core.setFailed(
                `Pull request #${prNumber} (${pr.html_url}) is still open. Merge it before continuing.`
              );
              return;
            }

            core.info(`Pull request #${prNumber} is ${pr.state}; workflow can continue.`);
