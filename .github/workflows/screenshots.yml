name: Make app screenshots

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Name for the screenshots artifact"
        required: false
        default: "screenshots"
        type: string
  workflow_call:
    inputs:
      artifact_name:
        description: "Name for the screenshots artifact"
        required: false
        default: "screenshots"
        type: string

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Build screenshots dependencies
        timeout-minutes: 3
        run: vp run --filter @trizum/screenshots^... build

      - name: Install Playwright Browsers
        timeout-minutes: 2
        run: vp run setup
        working-directory: packages/screenshots

      - name: Take screenshots
        timeout-minutes: 8
        run: vp run start
        working-directory: packages/screenshots

      - name: Make store-order previews
        timeout-minutes: 2
        run: vp run preview
        working-directory: packages/screenshots

      - name: Upload screenshots
        timeout-minutes: 2
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: packages/screenshots/screenshots
          retention-days: 7

      - name: Upload store-order previews
        timeout-minutes: 2
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}-previews
          path: packages/screenshots/previews
          retention-days: 14
