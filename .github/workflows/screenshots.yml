name: Make app screenshots

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Name for the screenshots artifact"
        required: false
        default: "screenshots"
        type: string
  workflow_call:
    inputs:
      artifact_name:
        description: "Name for the screenshots artifact"
        required: false
        default: "screenshots"
        type: string

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Build screenshots dependencies
        run: vp run --filter @trizum/screenshots^... build

      - name: Install Playwright Browsers
        timeout-minutes: 5
        run: vp run setup
        working-directory: packages/screenshots

      - name: Take screenshots
        run: vp run start
        working-directory: packages/screenshots

      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: packages/screenshots/screenshots
          retention-days: 7
