name: iOS App Store Deploy

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Submit for App Store review"
        required: false
        default: false
        type: boolean
      automatic_release:
        description: "Automatically release after approval"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      submit_for_review:
        description: "Submit for App Store review"
        required: false
        default: false
        type: boolean
      automatic_release:
        description: "Automatically release after approval"
        required: false
        default: false
        type: boolean

concurrency:
  group: ios-appstore-deploy
  cancel-in-progress: false

jobs:
  check-pending-changesets:
    permissions:
      contents: read
    uses: ./.github/workflows/check-pending-changesets.yml

  screenshots:
    name: Generate Screenshots
    needs: [check-pending-changesets]
    uses: ./.github/workflows/screenshots.yml
    with:
      artifact_name: ios-screenshots

  deploy:
    name: Build & Deploy to App Store
    needs: [check-pending-changesets, screenshots]
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler: "2.7.2"
          bundler-cache: true
          cache-version: ios-0
          working-directory: packages/mobile/ios/App

      - name: Build mobile web assets
        timeout-minutes: 8
        run: vp run --filter @trizum/mobile build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Download screenshots artifact
        timeout-minutes: 2
        uses: actions/download-artifact@v8
        with:
          name: ios-screenshots
          path: packages/screenshots/screenshots

      - name: Organize screenshots for fastlane
        timeout-minutes: 2
        working-directory: packages/screenshots
        run: |
          vp run organize:fastlane --platform ios --output ../mobile/ios/App/fastlane/screenshots
          echo "Screenshots organized:"
          ls -la ../mobile/ios/App/fastlane/screenshots/
          ls -la ../mobile/ios/App/fastlane/screenshots/en-US/ || true

      - name: Build and Deploy to App Store
        timeout-minutes: 18
        working-directory: packages/mobile/ios/App
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_REFRESH_PROVISIONING_PROFILE: "true"
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          bundle exec fastlane deploy_appstore_full \
            skip_screenshots:false \
            submit_for_review:${{ inputs.submit_for_review }} \
            automatic_release:${{ inputs.automatic_release }}

      - name: Upload IPA artifact
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: ios-appstore-ipa
          path: packages/mobile/ios/App/*.ipa
          retention-days: 14

      - name: Upload dSYM artifact
        timeout-minutes: 2
        uses: actions/upload-artifact@v6
        with:
          name: ios-dsym
          path: packages/mobile/ios/App/*.dSYM.zip
          retention-days: 14
