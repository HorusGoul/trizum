  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  react: 0.0.0-experimental-d025ddd3-20240722
  react-dom: 0.0.0-experimental-d025ddd3-20240722
